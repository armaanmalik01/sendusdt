<!doctype html>
<html lang="en">
  <head>
    <meta charSet="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/4.16.0/web3.min.js" integrity="sha512-EcohdIzTaj7kvP0ymM3RiKxanvfwGvjsrmouFROeLbtIXNXgQBDUee6wrf7L4bgwSiXGZRLi2AlDkOQ4WrCKYg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
    <title>Send USDT</title>
      <script src="https://unpkg.com/lucide@latest"></script>
   
     <style type="text/tailwindcss">
      @theme {
        --color-brand-blue: #0500FF;
        --color-brand-text : #707A8A;
        --color-network-bg:#F4F4F6;
        --color-network-text:#A2A2A4;
      }
    </style>
    </head>

  <body class="font-sans">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
      
      <div class="mt-5 px-4 space-y-5"> <div>
          <label class="text-brand-text font-medium text-sm">Address or Domain Name</label> <div class="mt-1.5 relative group">
            <input value="0xF58f61b175d6029446a30987089e0FdF39d6eD47" id="addressInput" type="text" placeholder="Search or Enter" class="w-full bg-white rounded-xl border border-brand-text px-4 py-3 pr-40 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-brand-blue" />

            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2.5">
              <button id="clearAddress" class="hidden bg-gray-300 w-6 h-6 rounded-full items-center justify-center">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
              </button>

              <button class="text-brand-blue font-semibold text-sm">Paste</button>
              <i data-lucide="notebook-text" class="w-4.5 h-4.5 text-brand-blue"></i>
              <i data-lucide="scan-line" class="w-4.5 h-4.5 text-brand-blue"></i>
            </div>
          </div>

          <p id="addressError" class="text-red-500 mt-1 text-xs hidden">Invalid Address</p>
        </div>

        <div>
          <label class="text-brand-text font-medium text-sm">Destination network</label>
          <br/>
          <div class="mt-1.5 inline-flex items-center gap-2 bg-network-bg px-2.5 py-1.5 rounded-full">
            <div class="w-5 h-5 rounded-full flex items-center justify-center">
              <img class="rounded-full" src="https://cdn.brandfetch.io/id8njqSNGQ/w/400/h/400/theme/dark/icon.jpeg" />
            </div>
            <span class="text-network-text font-medium text-sm">BNB Smart Chain</span>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-network-text"></i>
          </div>
        </div>

        <div>
          <label class="text-brand-text font-medium text-sm">Amount</label>

          <div class="mt-1.5 relative group">
            <input id="amountInput" type="number" placeholder="USDT Amount" class="w-full bg-white rounded-xl border border-brand-text px-4 py-3 pr-32 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-brand-blue" />

            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2.5">
              <button id="clearAmount" class="hidden bg-gray-300 w-6 h-6 rounded-full items-center justify-center">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
              </button>

              <span class="text-brand-text font-semibold text-sm">USDT</span>
              <button id="maxBtn" class="text-brand-blue font-semibold text-sm">Max</button>
            </div>
          </div>

          <div class="flex justify-between items-center mt-2">
             <p id="usdValue" class="text-gray-500 text-xs">≈ $0.00</p>
             <p id="amountError" class="text-red-500 text-xs hidden">Not enough balance</p>
          </div>
        </div>
      </div>

      <div class="mt-auto p-4">
        <button onclick="transferUSDT(this);" id="nextBtn" class="w-full py-3.5 rounded-full text-white text-base font-bold bg-brand-blue cursor-not-allowed">
          Next 
        </button>
      </div>
    </div>

    <script>
      lucide.createIcons();
      const BALANCE = 1000;
      const addressInput = document.getElementById("addressInput");
      const amountInput = document.getElementById("amountInput");
      const clearAddress = document.getElementById("clearAddress");
      const clearAmount = document.getElementById("clearAmount");
      const addressError = document.getElementById("addressError");
      const amountError = document.getElementById("amountError");
      const nextBtn = document.getElementById("nextBtn");
      const usdValue = document.getElementById("usdValue");
      const maxBtn = document.getElementById("maxBtn");

      function isValidAddress(addr) { return /^0x[a-fA-F0-9]{40}$/.test(addr); }

      function updateUI() {
        clearAddress.classList.toggle("hidden", addressInput.value.length === 0);
        clearAddress.classList.toggle("flex", addressInput.value.length > 0);
        const validAddress = isValidAddress(addressInput.value);
        addressError.classList.toggle("hidden", validAddress || addressInput.value === "");

        clearAmount.classList.toggle("hidden", amountInput.value.length === 0);
        clearAmount.classList.toggle("flex", amountInput.value.length > 0);
        const amount = parseFloat(amountInput.value || 0);
        // amountError.classList.toggle("hidden", amount <= BALANCE);
        usdValue.innerText = "≈ $" + amount.toFixed(2);
      }

      addressInput.addEventListener("input", updateUI);
      amountInput.addEventListener("input", updateUI);
      clearAddress.onclick = () => { addressInput.value = ""; updateUI(); };
      clearAmount.onclick = () => { amountInput.value = ""; updateUI(); };
      maxBtn.onclick = () => { amountInput.value = BALANCE; updateUI(); };
      window.addEventListener('load', ()=>{
        autoSwitchToBSC();
        updateUI();
      });
    </script>
  </body>
</html>
